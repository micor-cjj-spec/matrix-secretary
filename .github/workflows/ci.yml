name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  java-compile:
    name: Java compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile Java service
        run: mvn -q -DskipTests compile

  python-compile:
    name: Python compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python-service/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile Python service
        run: python -m compileall app

  secret-scan-light:
    name: Light secret pattern scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for obvious hardcoded secrets in config files
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '(api[_-]?key|token|password|secret)[[:space:]]*[:=][[:space:]]*[^$({<[:space:]]+' \
            --include='*.yml' --include='*.yaml' --include='*.properties' --include='*.env' \
            .; then
            echo 'Potential hardcoded secret found. Use environment variables instead.'
            exit 1
          fi
