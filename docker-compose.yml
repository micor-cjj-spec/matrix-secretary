name: ai-secretary-demo

services:
  mysql:
    image: mysql:8.0
    container_name: ai-secretary-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_123456
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - ai-secretary-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: ai-secretary-xxl-job-admin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?Unicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
        --spring.datasource.username=root
        --spring.datasource.password=root_123456
        --server.servlet.context-path=/xxl-job-admin
        --xxl.job.accessToken=default_token
    volumes:
      - xxl-job-logs:/data/applogs

volumes:
  ai-secretary-mysql-data:
  xxl-job-logs:
