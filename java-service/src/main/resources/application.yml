server:
  port: 10002

spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: ai-secretary-java-demo
  jackson:
    time-zone: Asia/Shanghai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/ai_secretary_demo?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:ai_demo}
    password: ${MYSQL_PASSWORD:ai_demo_123}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

auto-table:
  enable: true
  model-package: com.kailei.demo

ai-secretary:
  python-semantic-url: ${PYTHON_SEMANTIC_URL:http://127.0.0.1:10001/api/v1/semantic/parse}
  api-key: ${AI_SECRETARY_API_KEY:}
  email:
    send-enabled: ${EMAIL_SEND_ENABLED:false}
    test-recipient: ${EMAIL_TEST_RECIPIENT:}
  local-scheduler:
    enabled: ${AI_SECRETARY_LOCAL_SCHEDULER_ENABLED:true}
    dispatch-page-size: ${AI_SECRETARY_DISPATCH_PAGE_SIZE:50}
    dispatch-lease-seconds: ${AI_SECRETARY_DISPATCH_LEASE_SECONDS:60}
    dispatch-owner: ${AI_SECRETARY_DISPATCH_OWNER:local-scheduler}
    dispatch-running-timeout-seconds: ${AI_SECRETARY_DISPATCH_RUNNING_TIMEOUT_SECONDS:300}
    dispatch-recovery-batch-size: ${AI_SECRETARY_DISPATCH_RECOVERY_BATCH_SIZE:50}

feishu:
  enabled: ${FEISHU_ENABLED:false}
  client-id: ${FEISHU_CLIENT_ID:}
  client-secret: ${FEISHU_CLIENT_SECRET:}
  verification-token: ${FEISHU_VERIFICATION_TOKEN:}
  encrypt-key: ${FEISHU_ENCRYPT_KEY:}
  base-url: ${FEISHU_BASE_URL:https://open.feishu.cn}
  mock-send-enabled: ${FEISHU_MOCK_SEND_ENABLED:false}

xxl:
  job:
    enabled: ${XXL_JOB_ENABLED:false}
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://127.0.0.1:8080/xxl-job-admin}
    accessToken: ${XXL_JOB_ACCESS_TOKEN:default_token}
    executor:
      appname: ${XXL_JOB_EXECUTOR_APPNAME:ai-secretary-demo-executor}
      address: ${XXL_JOB_EXECUTOR_ADDRESS:}
      ip: ${XXL_JOB_EXECUTOR_IP:}
      port: ${XXL_JOB_EXECUTOR_PORT:10003}
      logpath: ${XXL_JOB_EXECUTOR_LOGPATH:./logs/xxl-job}
      logretentiondays: ${XXL_JOB_EXECUTOR_LOG_RETENTION_DAYS:7}
