<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 秘书任务中心</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --line: #d8e2ef;
      --text: #162033;
      --muted: #667085;
      --blue: #1d4ed8;
      --blue-soft: #eef4ff;
      --green: #047857;
      --green-soft: #ecfdf3;
      --amber: #b45309;
      --amber-soft: #fff7ed;
      --red: #b42318;
      --red-soft: #fff1f3;
      --violet: #5925dc;
      --violet-soft: #f4f3ff;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Microsoft YaHei", "PingFang SC", sans-serif;
    }
    button, input, textarea { font: inherit; }
    button {
      min-height: 36px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      padding: 8px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    button.secondary { background: var(--blue-soft); color: #1849a9; border-color: #c7d7fe; }
    button.ghost { background: #fff; color: #475467; border-color: var(--line); }
    button.danger { background: var(--red-soft); color: var(--red); border-color: #fecdd3; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    textarea, input {
      width: 100%;
      border: 1px solid #cfd8e7;
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 9px 10px;
    }
    textarea { min-height: 150px; resize: vertical; line-height: 1.6; }
    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    header { border-bottom: 1px solid var(--line); background: #fff; }
    .topbar {
      max-width: 1500px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 280px; }
    .logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--blue);
      color: #fff;
      font-weight: 700;
    }
    .brand h1 { margin: 0; font-size: 20px; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    .top-actions, .row, .tabs, .action-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .layout {
      max-width: 1500px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 20px 24px;
      display: grid;
      grid-template-columns: 370px minmax(440px, 1fr) 450px;
      gap: 14px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
    }
    .panel-head {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .panel-head h2 { margin: 0; font-size: 15px; }
    .panel-body { padding: 14px; }
    .stack { display: grid; gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field label, .muted { color: var(--muted); }
    .field label, .small { font-size: 12px; }
    .metrics { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .metric { border: 1px solid var(--line); border-radius: 6px; padding: 10px; background: #fbfcff; }
    .metric b { display: block; font-size: 22px; margin-bottom: 2px; }
    .metric span { color: var(--muted); font-size: 12px; }
    .tab { background: #fff; color: #475467; border-color: var(--line); padding: 7px 10px; }
    .tab.active { background: var(--blue-soft); color: #1849a9; border-color: #a4bcfd; }
    .plan-list { display: grid; gap: 8px; max-height: calc(100vh - 190px); overflow: auto; padding-right: 2px; }
    .plan-item { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 11px; cursor: pointer; display: grid; gap: 8px; }
    .plan-item.active { border-color: #84adff; box-shadow: 0 0 0 2px #dbeafe; }
    .plan-title { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
    .plan-title b { font-size: 14px; line-height: 1.35; }
    .plan-meta { display: flex; flex-wrap: wrap; gap: 6px; color: var(--muted); font-size: 12px; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1;
      background: #f2f4f7;
      color: #344054;
      white-space: nowrap;
    }
    .badge.wait { background: var(--amber-soft); color: var(--amber); }
    .badge.ok { background: var(--green-soft); color: var(--green); }
    .badge.bad { background: var(--red-soft); color: var(--red); }
    .badge.info { background: #eff6ff; color: var(--blue); }
    .badge.review { background: var(--violet-soft); color: var(--violet); }
    .detail-empty { color: var(--muted); padding: 28px; text-align: center; border: 1px dashed var(--line); border-radius: 8px; }
    .summary, .action-list, .timeline, .channel-events { display: grid; gap: 8px; }
    .kv { display: grid; grid-template-columns: 98px minmax(0, 1fr); gap: 8px; font-size: 13px; line-height: 1.5; }
    .kv .k { color: var(--muted); }
    .kv .v { word-break: break-word; }
    .action { border: 1px solid var(--line); border-radius: 8px; padding: 10px; display: grid; gap: 8px; background: #fbfcff; }
    .action h3 { margin: 0; font-size: 14px; line-height: 1.35; }
    .timeline { max-height: 280px; overflow: auto; }
    .log { border-left: 3px solid #cfd8e7; padding: 2px 0 2px 9px; display: grid; gap: 3px; font-size: 12px; }
    .log b { font-size: 13px; }
    .log p { margin: 0; color: var(--muted); word-break: break-word; }
    .channel-events { max-height: 260px; overflow: auto; }
    .event { border: 1px solid var(--line); border-radius: 6px; padding: 9px; display: grid; gap: 5px; font-size: 12px; background: #fff; }
    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: min(390px, calc(100vw - 40px));
      border: 1px solid #c7d7fe;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 16px 44px rgba(16, 24, 40, .2);
      padding: 14px;
      display: none;
      z-index: 30;
    }
    .toast.show { display: block; }
    .toast b { display: block; margin-bottom: 5px; }
    .mono { font-family: Consolas, Monaco, monospace; }
    @media (max-width: 1180px) {
      .layout { grid-template-columns: 340px minmax(0, 1fr); }
      .right { grid-column: 1 / -1; }
    }
    @media (max-width: 760px) {
      .topbar, .layout { padding-left: 12px; padding-right: 12px; }
      .layout { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="topbar">
      <div class="brand">
        <div class="logo">AI</div>
        <div>
          <h1>AI 秘书任务中心</h1>
          <p>任务创建、确认编排、定时执行、渠道回执和异常处理</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="ghost" id="refreshBtn" type="button">刷新</button>
        <button class="secondary" id="openEventsBtn" type="button">查看渠道事件</button>
      </div>
    </div>
  </header>
  <main class="layout">
    <section class="panel">
      <div class="panel-head">
        <h2>创建任务</h2>
        <span class="badge info">网页入口</span>
      </div>
      <div class="panel-body stack">
        <div class="field">
          <label for="userIdInput">用户标识</label>
          <input id="userIdInput" value="demo-user" />
        </div>
        <div class="field">
          <label for="taskInput">自然语言指令</label>
          <textarea id="taskInput">1分钟后提醒我喝水</textarea>
        </div>
        <div class="row">
          <button id="previewBtn" type="button">生成预览</button>
          <button id="confirmBtn" class="secondary" type="button" disabled>确认并编排</button>
        </div>
        <div id="statusText" class="small muted">等待操作</div>
        <div class="metrics" id="metrics"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>任务看板</h2>
        <div class="tabs" id="statusTabs"></div>
      </div>
      <div class="panel-body">
        <div class="plan-list" id="planList"></div>
      </div>
    </section>

    <section class="panel right">
      <div class="panel-head">
        <h2>操作闭环</h2>
        <span id="selectedBadge" class="badge">未选择</span>
      </div>
      <div class="panel-body stack">
        <div id="detail"></div>
        <div>
          <div class="panel-head" style="padding:0 0 9px;border-bottom:0;">
            <h2>执行日志</h2>
            <button id="reloadLogsBtn" class="ghost" type="button" disabled>刷新日志</button>
          </div>
          <div class="timeline" id="logs"></div>
        </div>
        <div>
          <div class="panel-head" style="padding:0 0 9px;border-bottom:0;">
            <h2>渠道事件</h2>
            <button id="reloadEventsBtn" class="ghost" type="button">刷新事件</button>
          </div>
          <div class="channel-events" id="channelEvents"></div>
        </div>
      </div>
    </section>
  </main>
</div>
<div class="toast" id="toast" role="alert" aria-live="assertive">
  <b id="toastTitle">提醒已执行</b>
  <div id="toastBody" class="small"></div>
</div>

<script>
  const API = "/api/task-center";
  const state = {
    plans: [],
    events: [],
    logs: [],
    selectedPlanId: null,
    previewPlanId: null,
    filter: "ALL",
    notified: new Set(JSON.parse(localStorage.getItem("aiSecretary.notifiedReminderActions") || "[]"))
  };
  const els = {
    userIdInput: document.querySelector("#userIdInput"),
    taskInput: document.querySelector("#taskInput"),
    previewBtn: document.querySelector("#previewBtn"),
    confirmBtn: document.querySelector("#confirmBtn"),
    refreshBtn: document.querySelector("#refreshBtn"),
    openEventsBtn: document.querySelector("#openEventsBtn"),
    reloadLogsBtn: document.querySelector("#reloadLogsBtn"),
    reloadEventsBtn: document.querySelector("#reloadEventsBtn"),
    statusText: document.querySelector("#statusText"),
    metrics: document.querySelector("#metrics"),
    statusTabs: document.querySelector("#statusTabs"),
    planList: document.querySelector("#planList"),
    detail: document.querySelector("#detail"),
    selectedBadge: document.querySelector("#selectedBadge"),
    logs: document.querySelector("#logs"),
    channelEvents: document.querySelector("#channelEvents"),
    toast: document.querySelector("#toast"),
    toastTitle: document.querySelector("#toastTitle"),
    toastBody: document.querySelector("#toastBody")
  };

  const statusText = {
    WAITING_CONFIRM: "等待确认",
    CONFIRMED: "已确认",
    SCHEDULED: "已调度",
    EXECUTED: "已执行",
    FAILED: "执行失败",
    FAILED_FINAL: "最终失败",
    NEEDS_MANUAL_REVIEW: "待人工处理",
    CANCELLED: "已取消"
  };
  const actionTypeText = {
    reminder: "提醒事项",
    send_message: "发送消息",
    reply_message: "回复消息",
    send_email: "发送邮件",
    create_todo: "创建待办",
    schedule_task: "定时任务"
  };
  const targetTypeText = {
    user: "用户",
    group: "群组",
    email: "邮箱",
    dynamic: "动态对象",
    self: "本人",
    unknown: "未识别"
  };
  const scheduleTypeText = {
    none: "无需定时",
    once: "一次性任务",
    recurring: "周期任务"
  };
  const priorityText = { low: "低", normal: "普通", high: "高" };
  const riskText = { LOW: "低风险", MEDIUM: "中风险", HIGH: "高风险" };
  const eventStatusText = { RECEIVED: "已接收", PROCESSING: "处理中", PROCESSED: "已处理", FAILED: "处理失败" };
  const statusGroups = [
    ["ALL", "全部"],
    ["WAITING_CONFIRM", "待确认"],
    ["SCHEDULED", "已调度"],
    ["EXECUTED", "已执行"],
    ["FAILED", "失败"],
    ["NEEDS_MANUAL_REVIEW", "人工处理"]
  ];

  els.previewBtn.addEventListener("click", preview);
  els.confirmBtn.addEventListener("click", () => confirmPlan(state.previewPlanId));
  els.refreshBtn.addEventListener("click", refreshAll);
  els.reloadLogsBtn.addEventListener("click", loadLogs);
  els.reloadEventsBtn.addEventListener("click", loadEvents);
  els.openEventsBtn.addEventListener("click", () => {
    loadEvents();
    els.channelEvents.scrollIntoView({ behavior: "smooth", block: "nearest" });
  });
  els.userIdInput.addEventListener("change", () => {
    state.selectedPlanId = null;
    state.previewPlanId = null;
    els.confirmBtn.disabled = true;
    refreshAll();
  });

  start();

  async function start() {
    renderTabs();
    await refreshAll();
    setInterval(refreshSoft, 6000);
  }

  async function refreshAll() {
    await Promise.all([loadPlans(), loadEvents()]);
    if (state.selectedPlanId) await loadLogs();
  }

  async function refreshSoft() {
    const before = new Map(state.plans.flatMap(plan => (plan.tasks || []).map(action => [action.actionId, action.status])));
    await loadPlans(false);
    notifyExecutedReminders(before);
    if (state.selectedPlanId) await loadLogs(false);
    await loadEvents(false);
  }

  async function preview() {
    try {
      setStatus("正在解析任务...");
      const plan = await request(`${API}/plans/preview`, {
        method: "POST",
        body: { text: els.taskInput.value, timezone: "Asia/Shanghai", userId: currentUserId() }
      });
      state.previewPlanId = plan.planId;
      state.selectedPlanId = plan.planId;
      els.confirmBtn.disabled = false;
      setStatus(`预览已生成：${plan.planId}`);
      await loadPlans();
      selectPlan(plan.planId);
    } catch (err) {
      showError(err);
    }
  }

  async function confirmPlan(planId) {
    if (!planId) return;
    try {
      setStatus("正在确认并编排...");
      const res = await request(`${API}/plans/${encodeURIComponent(planId)}/confirm`, {
        method: "POST",
        body: { operatorUserId: currentUserId() }
      });
      state.previewPlanId = null;
      els.confirmBtn.disabled = true;
      const summary = res.executionSummary || {};
      setStatus(`已执行 ${summary.executed || 0}，已调度 ${summary.scheduled || 0}，失败 ${summary.failed || 0}`);
      await loadPlans();
      selectPlan(planId);
    } catch (err) {
      showError(err);
    }
  }

  async function cancelPlan(planId) {
    await request(`${API}/plans/${encodeURIComponent(planId)}/cancel`, {
      method: "POST",
      body: { operatorUserId: currentUserId(), reason: "在任务中心取消" }
    });
    await loadPlans();
    selectPlan(planId);
  }

  async function retryAction(planId, actionId) {
    await request(`${API}/plans/${encodeURIComponent(planId)}/actions/${encodeURIComponent(actionId)}/retry`, {
      method: "POST",
      body: { operatorUserId: currentUserId() }
    });
    await loadPlans();
    selectPlan(planId);
  }

  async function resolveManual(planId, actionId) {
    await request(`${API}/plans/${encodeURIComponent(planId)}/actions/${encodeURIComponent(actionId)}/manual-resolve`, {
      method: "POST",
      body: { operatorUserId: currentUserId(), note: "已在任务中心人工处理" }
    });
    await loadPlans();
    selectPlan(planId);
  }

  async function reopenFinal(planId, actionId) {
    await request(`${API}/plans/${encodeURIComponent(planId)}/actions/${encodeURIComponent(actionId)}/reopen-final-failure`, {
      method: "POST",
      body: { operatorUserId: currentUserId(), reason: "在任务中心重新打开" }
    });
    await loadPlans();
    selectPlan(planId);
  }

  async function loadPlans(renderNow = true) {
    try {
      state.plans = await request(`${API}/plans?userId=${encodeURIComponent(currentUserId())}`);
      if (!state.selectedPlanId && state.plans.length) state.selectedPlanId = state.plans[0].planId;
      if (renderNow) renderAll();
    } catch (err) {
      state.plans = [];
      showError(err);
      renderAll();
    }
  }

  async function loadLogs(renderNow = true) {
    if (!state.selectedPlanId) return;
    try {
      state.logs = await request(`${API}/plans/${encodeURIComponent(state.selectedPlanId)}/logs?userId=${encodeURIComponent(currentUserId())}`);
      if (renderNow) renderLogs();
    } catch (err) {
      state.logs = [];
      showError(err);
      renderLogs();
    }
  }

  async function loadEvents(renderNow = true) {
    try {
      state.events = await request(`${API}/channel-events?limit=20`);
      if (renderNow) renderEvents();
    } catch (err) {
      state.events = [];
      showError(err);
      renderEvents();
    }
  }

  function selectPlan(planId) {
    state.selectedPlanId = planId;
    renderAll();
    loadLogs();
  }

  function renderAll() {
    renderMetrics();
    renderTabs();
    renderPlanList();
    renderDetail();
    renderLogs();
    renderEvents();
  }

  function renderMetrics() {
    const actions = state.plans.flatMap(plan => plan.tasks || []);
    els.metrics.innerHTML = [
      metric(state.plans.length, "任务计划"),
      metric(actions.length, "动作明细"),
      metric(actions.filter(a => a.status === "SCHEDULED").length, "等待触发"),
      metric(actions.filter(a => ["FAILED", "FAILED_FINAL", "NEEDS_MANUAL_REVIEW"].includes(a.status)).length, "异常待办")
    ].join("");
  }

  function renderTabs() {
    els.statusTabs.innerHTML = statusGroups.map(([key, label]) => {
      const count = key === "ALL" ? state.plans.length : state.plans.filter(plan => plan.status === key).length;
      return `<button class="tab ${state.filter === key ? "active" : ""}" data-filter="${key}" type="button">${label} ${count}</button>`;
    }).join("");
    els.statusTabs.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        state.filter = btn.dataset.filter;
        renderTabs();
        renderPlanList();
      });
    });
  }

  function renderPlanList() {
    const plans = filteredPlans();
    if (!plans.length) {
      els.planList.innerHTML = `<div class="detail-empty">当前分组没有任务</div>`;
      return;
    }
    els.planList.innerHTML = plans.map(plan => {
      const first = (plan.tasks || [])[0] || {};
      return `
        <div class="plan-item ${plan.planId === state.selectedPlanId ? "active" : ""}" data-plan-id="${escapeHtml(plan.planId)}">
          <div class="plan-title">
            <b>${escapeHtml(first.title || first.content || short(plan.sourceText, 38) || plan.planId)}</b>
            ${badge(plan.status)}
          </div>
          <div class="plan-meta">
            <span>${channelLabel(plan.userId)}</span>
            <span>${escapeHtml(plan.planId)}</span>
            <span>${formatDate(plan.updatedAt || plan.createdAt)}</span>
          </div>
        </div>`;
    }).join("");
    els.planList.querySelectorAll(".plan-item").forEach(item => {
      item.addEventListener("click", () => selectPlan(item.dataset.planId));
    });
  }

  function renderDetail() {
    const plan = currentPlan();
    if (!plan) {
      els.selectedBadge.outerHTML = `<span id="selectedBadge" class="badge">未选择</span>`;
      els.selectedBadge = document.querySelector("#selectedBadge");
      els.detail.innerHTML = `<div class="detail-empty">选择一个任务查看操作闭环</div>`;
      els.reloadLogsBtn.disabled = true;
      return;
    }
    els.selectedBadge.outerHTML = badge(plan.status, "selectedBadge");
    els.selectedBadge = document.querySelector("#selectedBadge");
    const warnings = (plan.warnings || []).map(warning => `<div class="kv"><div class="k">解析提示</div><div class="v">${escapeHtml(displayText(warning))}</div></div>`).join("");
    els.detail.innerHTML = `
      <div class="summary">
        <div class="kv"><div class="k">计划编号</div><div class="v mono">${escapeHtml(plan.planId)}</div></div>
        <div class="kv"><div class="k">来源渠道</div><div class="v">${channelLabel(plan.userId)}</div></div>
        <div class="kv"><div class="k">会话编号</div><div class="v mono">${escapeHtml(plan.sessionId || "-")}</div></div>
        <div class="kv"><div class="k">原始指令</div><div class="v">${escapeHtml(plan.sourceText || "-")}</div></div>
        ${warnings}
        <div class="row">
          <button class="secondary" type="button" data-confirm="${escapeHtml(plan.planId)}" ${plan.status !== "WAITING_CONFIRM" ? "disabled" : ""}>确认并编排</button>
          <button class="danger" type="button" data-cancel="${escapeHtml(plan.planId)}" ${["EXECUTED", "CANCELLED"].includes(plan.status) ? "disabled" : ""}>取消任务</button>
        </div>
      </div>
      <div class="action-list">${(plan.tasks || []).map(action => renderAction(plan, action)).join("")}</div>`;
    els.detail.querySelectorAll("[data-confirm]").forEach(btn => btn.addEventListener("click", () => confirmPlan(btn.dataset.confirm)));
    els.detail.querySelectorAll("[data-cancel]").forEach(btn => btn.addEventListener("click", () => runCommand(() => cancelPlan(btn.dataset.cancel))));
    els.detail.querySelectorAll("[data-retry]").forEach(btn => btn.addEventListener("click", () => runCommand(() => retryAction(plan.planId, btn.dataset.retry))));
    els.detail.querySelectorAll("[data-resolve]").forEach(btn => btn.addEventListener("click", () => runCommand(() => resolveManual(plan.planId, btn.dataset.resolve))));
    els.detail.querySelectorAll("[data-reopen]").forEach(btn => btn.addEventListener("click", () => runCommand(() => reopenFinal(plan.planId, btn.dataset.reopen))));
    els.reloadLogsBtn.disabled = false;
  }

  function renderAction(plan, action) {
    const schedule = action.schedule || {};
    const target = action.target || {};
    const runTime = schedule.effectiveRunAt || schedule.nextRunAt || schedule.runAt || schedule.originalText || "-";
    return `
      <div class="action">
        <div class="plan-title">
          <h3>${escapeHtml(action.title || action.content || action.actionId)}</h3>
          ${badge(action.status)}
        </div>
        <div class="kv"><div class="k">动作类型</div><div class="v">${formatActionType(action.actionType)}</div></div>
        <div class="kv"><div class="k">对象</div><div class="v">${escapeHtml(target.name || target.address || "未指定")}（${formatTargetType(target.targetType)}）</div></div>
        <div class="kv"><div class="k">计划类型</div><div class="v">${formatScheduleType(schedule.scheduleType)}</div></div>
        <div class="kv"><div class="k">计划时间</div><div class="v">${escapeHtml(runTime)}</div></div>
        <div class="kv"><div class="k">Cron 表达式</div><div class="v mono">${escapeHtml(schedule.cron || "未生成")}</div></div>
        <div class="kv"><div class="k">优先级</div><div class="v">${formatPriority(action.priority)}</div></div>
        <div class="kv"><div class="k">风险等级</div><div class="v">${formatRisk(action.riskLevel)}</div></div>
        <div class="kv"><div class="k">置信度</div><div class="v">${formatConfidence(action.confidence)}</div></div>
        <div class="kv"><div class="k">内容</div><div class="v">${escapeHtml(action.content || "-")}</div></div>
        <div class="kv"><div class="k">解析备注</div><div class="v">${escapeHtml(displayText(action.analysisNote || "-"))}</div></div>
        <div class="kv"><div class="k">执行说明</div><div class="v">${escapeHtml(displayText(action.executionNote || "-"))}</div></div>
        <div class="action-tools">
          <button class="ghost" type="button" data-retry="${escapeHtml(action.actionId)}" ${action.status !== "FAILED" ? "disabled" : ""}>重试</button>
          <button class="ghost" type="button" data-resolve="${escapeHtml(action.actionId)}" ${action.status !== "NEEDS_MANUAL_REVIEW" ? "disabled" : ""}>人工完成</button>
          <button class="ghost" type="button" data-reopen="${escapeHtml(action.actionId)}" ${action.status !== "FAILED_FINAL" ? "disabled" : ""}>重新打开</button>
        </div>
      </div>`;
  }

  function renderLogs() {
    if (!state.selectedPlanId || !state.logs.length) {
      els.logs.innerHTML = `<div class="detail-empty">暂无执行日志</div>`;
      return;
    }
    els.logs.innerHTML = state.logs.map(log => `
      <div class="log">
        <b>${formatStatus(log.status)} · ${formatActionType(log.skillName || log.actionType)}</b>
        <p>${formatDate(log.createdAt)} · ${escapeHtml(log.actionId || "-")}</p>
        ${log.errorMessage ? `<p style="color:var(--red)">${escapeHtml(displayText(log.errorMessage))}</p>` : ""}
      </div>`).join("");
  }

  function renderEvents() {
    if (!state.events.length) {
      els.channelEvents.innerHTML = `<div class="detail-empty">暂无渠道事件</div>`;
      return;
    }
    els.channelEvents.innerHTML = state.events.map(event => `
      <div class="event">
        <div class="row">${eventBadge(event.status)}<b>${formatPlatform(event.platform)}</b><span class="muted">${formatDate(event.createdAt)}</span></div>
        <div class="mono">${escapeHtml(event.eventId || "-")}</div>
        <div class="muted">会话：${escapeHtml(event.conversationId || "-")}</div>
        <div class="muted">消息：${escapeHtml(event.messageId || "-")}</div>
        ${event.errorMessage ? `<div style="color:var(--red)">${escapeHtml(displayText(event.errorMessage))}</div>` : ""}
      </div>`).join("");
  }

  function notifyExecutedReminders(before) {
    state.plans.flatMap(plan => (plan.tasks || []).map(action => ({ plan, action }))).forEach(({ plan, action }) => {
      if (action.actionType !== "reminder" || action.status !== "EXECUTED" || state.notified.has(action.actionId)) return;
      const oldStatus = before.get(action.actionId);
      if (oldStatus && oldStatus !== "EXECUTED") {
        state.notified.add(action.actionId);
        localStorage.setItem("aiSecretary.notifiedReminderActions", JSON.stringify([...state.notified].slice(-300)));
        showToast("提醒已执行", action.content || action.title || plan.planId);
      }
    });
  }

  async function runCommand(command) {
    try {
      await command();
      setStatus("操作已完成");
    } catch (err) {
      showError(err);
    }
  }

  async function request(url, options = {}) {
    const init = { method: options.method || "GET", headers: { "Content-Type": "application/json" } };
    if (options.body) init.body = JSON.stringify(options.body);
    const res = await fetch(url, init);
    const text = await res.text();
    const data = text ? JSON.parse(text) : null;
    if (!res.ok) throw new Error((data && (data.message || data.error)) || text || res.statusText);
    return data;
  }

  function filteredPlans() {
    const plans = [...state.plans].sort((a, b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));
    return state.filter === "ALL" ? plans : plans.filter(plan => plan.status === state.filter);
  }

  function currentPlan() {
    return state.plans.find(plan => plan.planId === state.selectedPlanId);
  }

  function metric(value, label) {
    return `<div class="metric"><b>${value}</b><span>${label}</span></div>`;
  }

  function badge(status, id) {
    return `<span ${id ? `id="${id}"` : ""} class="badge ${statusClass(status)}">${formatStatus(status)}</span>`;
  }

  function eventBadge(status) {
    const text = eventStatusText[status] || "未知状态";
    const cls = status === "PROCESSED" ? "ok" : status === "FAILED" ? "bad" : "wait";
    return `<span class="badge ${cls}">${text}</span>`;
  }

  function statusClass(status) {
    if (["EXECUTED", "CONFIRMED"].includes(status)) return "ok";
    if (["WAITING_CONFIRM", "SCHEDULED"].includes(status)) return "wait";
    if (["FAILED", "FAILED_FINAL"].includes(status)) return "bad";
    if (status === "NEEDS_MANUAL_REVIEW") return "review";
    return "info";
  }

  function formatStatus(value) {
    return statusText[value] || "未知状态";
  }

  function formatActionType(value) {
    return actionTypeText[String(value || "").toLowerCase()] || "未知动作";
  }

  function formatTargetType(value) {
    return targetTypeText[String(value || "").toLowerCase()] || "未识别";
  }

  function formatScheduleType(value) {
    return scheduleTypeText[String(value || "").toLowerCase()] || "无需定时";
  }

  function formatPriority(value) {
    return priorityText[String(value || "").toLowerCase()] || "普通";
  }

  function formatRisk(value) {
    return riskText[String(value || "").toUpperCase()] || "低风险";
  }

  function formatConfidence(value) {
    return typeof value === "number" ? `${Math.round(value * 100)}%` : "未知";
  }

  function formatPlatform(value) {
    const text = String(value || "").toUpperCase();
    if (text === "FEISHU") return "飞书";
    if (text === "WEB") return "网页";
    return "其他渠道";
  }

  function displayText(value) {
    const replacements = {
      WAITING_CONFIRM: "等待确认",
      CONFIRMED: "已确认",
      SCHEDULED: "已调度",
      EXECUTED: "已执行",
      FAILED_FINAL: "最终失败",
      FAILED: "执行失败",
      NEEDS_MANUAL_REVIEW: "待人工处理",
      CANCELLED: "已取消",
      send_email: "发送邮件",
      send_message: "发送消息",
      reply_message: "回复消息",
      reminder: "提醒事项",
      create_todo: "创建待办",
      schedule_task: "定时任务",
      target_type: "对象类型",
      schedule_type: "计划类型",
      run_at: "执行时间",
      next_run_at: "下次触发时间",
      last_run_at: "上次触发时间",
      user: "用户",
      group: "群组",
      email: "邮箱",
      dynamic: "动态对象",
      self: "本人",
      unknown: "未识别"
    };
    return Object.entries(replacements).reduce((text, [raw, translated]) => {
      return text.replaceAll(raw, translated);
    }, String(value == null ? "" : value));
  }

  function channelLabel(userId) {
    return String(userId || "").startsWith("feishu:") ? "飞书" : "网页";
  }

  function currentUserId() {
    return els.userIdInput.value.trim() || "demo-user";
  }

  function setStatus(text) {
    els.statusText.textContent = text;
  }

  function showToast(title, body) {
    els.toastTitle.textContent = title;
    els.toastBody.textContent = body;
    els.toast.classList.add("show");
    setTimeout(() => els.toast.classList.remove("show"), 9000);
  }

  function showError(err) {
    const message = err && err.message ? err.message : String(err);
    setStatus(`操作失败：${message}`);
    showToast("操作失败", message);
  }

  function short(value, len) {
    const text = String(value || "");
    return text.length > len ? `${text.slice(0, len - 1)}...` : text;
  }

  function formatDate(value) {
    if (!value) return "-";
    const date = new Date(value);
    return Number.isNaN(date.getTime()) ? value : date.toLocaleString("zh-CN", { hour12: false });
  }

  function escapeHtml(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, ch => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[ch]));
  }
</script>
</body>
</html>
