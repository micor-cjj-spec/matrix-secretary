<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 秘书 Java + Python Demo</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "Microsoft YaHei", sans-serif; background: #f4f6fa; color: #162033; }
    main { max-width: 1180px; margin: 0 auto; padding: 28px 18px; display: grid; grid-template-columns: minmax(0, 1fr) minmax(380px, 540px); gap: 18px; }
    section { background: #fff; border: 1px solid #dbe3ef; border-radius: 8px; padding: 18px; min-width: 0; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 16px; color: #65758c; line-height: 1.55; }
    textarea { width: 100%; min-height: 210px; resize: vertical; border: 1px solid #c9d4e5; border-radius: 6px; padding: 13px; font-size: 15px; line-height: 1.65; }
    button { border: 0; border-radius: 6px; background: #1d4ed8; color: #fff; padding: 10px 15px; cursor: pointer; font-size: 14px; }
    button.secondary { background: #e8eefc; color: #1d4ed8; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
    .task { border: 1px solid #dbe3ef; background: #fbfcff; border-radius: 8px; padding: 13px; margin-bottom: 12px; }
    .task h2 { margin: 0 0 10px; font-size: 16px; }
    .warning { border: 1px solid #f2c97d; background: #fff8e6; color: #7a4b00; border-radius: 6px; padding: 10px 12px; margin-bottom: 12px; font-size: 13px; line-height: 1.55; }
    .meta { display: grid; grid-template-columns: 86px minmax(0, 1fr); gap: 7px 10px; font-size: 13px; line-height: 1.5; }
    .label { color: #64748b; }
    .value { color: #0f172a; word-break: break-word; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eef2ff; color: #1d4ed8; font-size: 12px; }
    .tag.success { background: #ecfdf5; color: #047857; }
    .tag.warn { background: #fff7ed; color: #c2410c; }
    .tag.danger { background: #fef2f2; color: #b91c1c; }
    .expression { font-family: Consolas, Monaco, monospace; background: #f1f5f9; border-radius: 4px; padding: 2px 6px; }
    .debug-note { color: #64748b; font-size: 12px; line-height: 1.6; margin-top: 10px; }
    .reminder-popup { position: fixed; right: 24px; bottom: 24px; z-index: 20; width: min(360px, calc(100vw - 32px)); border: 1px solid #bfdbfe; border-radius: 8px; background: #fff; box-shadow: 0 18px 50px rgba(15, 23, 42, .22); padding: 16px; transform: translateY(18px); opacity: 0; pointer-events: none; transition: opacity .18s ease, transform .18s ease; }
    .reminder-popup.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .reminder-popup h2 { margin: 0 0 8px; font-size: 17px; }
    .reminder-popup p { margin: 0; color: #334155; }
    .reminder-popup .popup-time { margin-top: 10px; color: #64748b; font-size: 12px; }
    .reminder-popup .popup-actions { display: flex; justify-content: flex-end; margin-top: 14px; }
    @media (max-width: 920px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <section>
    <h1>AI 秘书 Java + Python Demo</h1>
    <p>Java 负责业务入口、预览确认、状态编排；Python 负责语义识别和任务拆解。</p>
    <textarea id="input">明天下午三点提醒我给王总发邮件，内容是项目方案已经更新；另外每周五上午十点通知团队群提交周报。收到李雷的消息后回复他：我下午会确认合同。</textarea>
    <div class="toolbar">
      <button id="previewBtn">生成任务预览</button>
      <button id="confirmBtn" class="secondary" disabled>确认并编排</button>
      <span id="status"></span>
    </div>
  </section>
  <section>
    <h1>任务计划</h1>
    <div id="tasks"></div>
    <div class="debug-note">页面仅展示中文业务信息；后端原始字段已在前端做中文转换。</div>
  </section>
</main>
<div id="reminderPopup" class="reminder-popup" role="alert" aria-live="assertive" aria-hidden="true">
  <h2>提醒事项</h2>
  <p id="reminderPopupContent"></p>
  <div id="reminderPopupTime" class="popup-time"></div>
  <div class="popup-actions">
    <button id="reminderPopupClose" class="secondary" type="button">知道了</button>
  </div>
</div>
<script>
  const input = document.querySelector("#input");
  const tasksEl = document.querySelector("#tasks");
  const statusEl = document.querySelector("#status");
  const confirmBtn = document.querySelector("#confirmBtn");
  const reminderPopup = document.querySelector("#reminderPopup");
  const reminderPopupContent = document.querySelector("#reminderPopupContent");
  const reminderPopupTime = document.querySelector("#reminderPopupTime");
  const reminderPopupClose = document.querySelector("#reminderPopupClose");
  let currentPlanId = null;
  let reminderPollStarted = false;
  let reminderPollReady = false;
  let reminderPopupTimer = null;
  const REMINDER_NOTIFIED_KEY = "aiSecretary.notifiedReminderActionIds";
  const notifiedReminderIds = loadNotifiedReminderIds();

  const ACTION_TYPE_TEXT = {
    reply_message: "回复消息",
    send_message: "发送消息",
    send_email: "发送邮件",
    reminder: "提醒事项",
    create_todo: "创建待办",
    schedule_task: "定时任务"
  };

  const TARGET_TYPE_TEXT = {
    user: "用户",
    group: "群组",
    email: "邮箱",
    dynamic: "动态对象",
    self: "本人",
    unknown: "未识别"
  };

  const STATUS_TEXT = {
    WAITING_CONFIRM: "等待确认",
    CONFIRMED: "已确认",
    EXECUTED: "已执行",
    SCHEDULED: "已调度",
    FAILED: "执行失败"
  };

  const SCHEDULE_TYPE_TEXT = {
    none: "无需定时",
    once: "一次性任务",
    recurring: "周期任务"
  };

  const PRIORITY_TEXT = {
    low: "低",
    normal: "普通",
    high: "高"
  };

  const ENUM_TEXT_REPLACEMENTS = {
    reply_message: "回复消息",
    send_message: "发送消息",
    send_email: "发送邮件",
    reminder: "提醒事项",
    create_todo: "创建待办",
    schedule_task: "定时任务",
    user: "用户",
    group: "群组",
    email: "邮箱",
    dynamic: "动态对象",
    self: "本人",
    unknown: "未识别",
    none: "无需定时",
    once: "一次性任务",
    recurring: "周期任务",
    low: "低",
    normal: "普通",
    high: "高",
    WAITING_CONFIRM: "等待确认",
    CONFIRMED: "已确认",
    EXECUTED: "已执行",
    SCHEDULED: "已调度",
    FAILED: "执行失败"
  };

  document.querySelector("#previewBtn").addEventListener("click", preview);
  confirmBtn.addEventListener("click", confirmPlan);
  reminderPopupClose.addEventListener("click", hideReminderPopup);
  startReminderPolling();

  async function preview() {
    statusEl.textContent = "解析中...";
    const res = await fetch("/api/ai-task/preview", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ text: input.value, timezone: "Asia/Shanghai", userId: "demo-user" })
    });
    const data = await res.json();
    currentPlanId = data.planId;
    confirmBtn.disabled = !currentPlanId;
    statusEl.textContent = `状态：${formatStatus(data.status)}`;
    render(data);
  }

  async function confirmPlan() {
    statusEl.textContent = "编排中...";
    const res = await fetch(`/api/ai-task/${currentPlanId}/confirm`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ operatorUserId: "demo-user" })
    });
    const data = await res.json();
    statusEl.textContent = `已执行：${data.executionSummary.executed}，已调度：${data.executionSummary.scheduled}，失败：${data.executionSummary.failed}`;
    render(data.plan);
    reminderPollReady = true;
  }

  function render(plan) {
    const warnings = (plan.warnings || []).map(item => `<div>${escapeHtml(item)}</div>`).join("");
    const warningHtml = warnings ? `<div class="warning">${warnings}</div>` : "";
    const taskHtml = (plan.tasks || []).map(task => `
      <div class="task">
        <h2>${escapeHtml(task.title)}</h2>
        <div class="meta">
          <div class="label">动作类型</div><div class="value"><span class="tag">${formatActionType(readField(task, "actionType", "action_type"))}</span></div>
          <div class="label">对象</div><div class="value">${escapeHtml(readTargetName(task.target))}</div>
          <div class="label">对象类型</div><div class="value">${formatTargetType(readField(task.target, "targetType", "target_type"))}</div>
          <div class="label">计划类型</div><div class="value">${formatScheduleType(readField(task.schedule, "scheduleType", "schedule_type"))}</div>
          <div class="label">计划时间</div><div class="value">${formatScheduleText(task.schedule)}</div>
          ${renderCron(task.schedule)}
          <div class="label">优先级</div><div class="value">${formatPriority(readField(task, "priority"))}</div>
          <div class="label">置信度</div><div class="value">${formatConfidence(task.confidence)}</div>
          <div class="label">状态</div><div class="value">${formatStatusTag(readField(task, "status"))}</div>
          <div class="label">内容</div><div class="value">${escapeHtml(task.content || "")}</div>
          <div class="label">解析备注</div><div class="value">${escapeHtml(task.analysisNote || "")}</div>
          <div class="label">说明</div><div class="value">${formatExecutionNote(task.executionNote || "")}</div>
        </div>
      </div>
    `).join("");
    const emptyHtml = taskHtml ? "" : `<div class="warning">没有生成可执行任务，请查看解析警告或检查模型配置。</div>`;
    tasksEl.innerHTML = warningHtml + taskHtml + emptyHtml;
  }

  function renderCron(schedule) {
    if (!shouldShowCron(schedule)) return "";
    const cron = readField(schedule, "cron");
    return `
      <div class="label">Cron 表达式</div>
      <div class="value">${cron ? `<span class="expression">${escapeHtml(cron)}</span>` : "未生成"}</div>
    `;
  }

  function formatActionType(value) {
    return ACTION_TYPE_TEXT[normalizeEnum(value)] || "未知动作";
  }

  function formatTargetType(value) {
    return TARGET_TYPE_TEXT[normalizeEnum(value)] || "未识别";
  }

  function formatStatus(value) {
    return STATUS_TEXT[normalizeStatus(value)] || "未知状态";
  }

  function formatStatusTag(value) {
    const text = formatStatus(value);
    const status = normalizeStatus(value);
    let className = "tag";
    if (status === "EXECUTED" || status === "CONFIRMED") className += " success";
    if (status === "SCHEDULED" || status === "WAITING_CONFIRM") className += " warn";
    if (status === "FAILED") className += " danger";
    return `<span class="${className}">${text}</span>`;
  }

  function formatScheduleType(value) {
    return SCHEDULE_TYPE_TEXT[normalizeEnum(value)] || "无需定时";
  }

  function formatScheduleText(schedule) {
    if (!schedule) return "立即执行或等待人工确认";
    const parts = [];
    const originalText = readField(schedule, "originalText", "original_text");
    const runAt = readField(schedule, "runAt", "run_at");
    const nextRunAt = readField(schedule, "nextRunAt", "next_run_at");
    const lastRunAt = readField(schedule, "lastRunAt", "last_run_at");
    if (originalText) parts.push(originalText);
    if (runAt) parts.push(`执行时间：${formatDateTime(runAt)}`);
    if (nextRunAt) parts.push(`下次触发：${formatDateTime(nextRunAt)}`);
    if (lastRunAt) parts.push(`上次触发：${formatDateTime(lastRunAt)}`);
    return escapeHtml(parts.join("；") || "立即执行或等待人工确认");
  }

  function formatExecutionNote(value) {
    if (!value) return "";
    const text = String(value)
      .replaceAll("WAITING_CONFIRM", "等待确认")
      .replaceAll("CONFIRMED", "已确认")
      .replaceAll("EXECUTED", "已执行")
      .replaceAll("SCHEDULED", "已调度")
      .replaceAll("FAILED", "执行失败")
      .replaceAll("nextRunAt=", "下次触发时间：")
      .replaceAll("cron=", "Cron 表达式：");
    return escapeHtml(replaceEnumText(text));
  }

  function formatPriority(value) {
    return PRIORITY_TEXT[normalizeEnum(value)] || "普通";
  }

  function shouldShowCron(schedule) {
    if (!schedule) return false;
    const scheduleType = normalizeEnum(readField(schedule, "scheduleType", "schedule_type"));
    return Boolean(readField(schedule, "cron")) || scheduleType === "recurring";
  }

  function readTargetName(target) {
    return readField(target, "name", "address") || "未指定";
  }

  function readField(obj, ...keys) {
    if (!obj) return "";
    for (const key of keys) {
      if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") {
        return obj[key];
      }
    }
    return "";
  }

  function normalizeEnum(value) {
    return String(value || "").trim().toLowerCase();
  }

  function normalizeStatus(value) {
    return String(value || "").trim().toUpperCase();
  }

  function replaceEnumText(value) {
    return Object.entries(ENUM_TEXT_REPLACEMENTS).reduce(
      (text, [raw, translated]) => text.replaceAll(raw, translated),
      value
    );
  }

  function startReminderPolling() {
    if (reminderPollStarted) return;
    reminderPollStarted = true;
    pollExecutedReminders();
    setInterval(pollExecutedReminders, 5000);
  }

  async function pollExecutedReminders() {
    try {
      const res = await fetch("/api/ai-task", { cache: "no-store" });
      if (!res.ok) return;
      const plans = await res.json();
      collectExecutedReminders(Array.isArray(plans) ? plans : []);
    } catch (err) {
      console.warn("提醒轮询失败", err);
    }
  }

  function collectExecutedReminders(plans) {
    const reminders = plans
      .flatMap(plan => (plan.tasks || []).map(task => ({ plan, task })))
      .filter(({ task }) => isExecutedReminder(task));

    if (!reminderPollReady) {
      reminders.forEach(({ task }) => notifiedReminderIds.add(task.actionId));
      saveNotifiedReminderIds();
      reminderPollReady = true;
      return;
    }

    reminders.forEach(({ plan, task }) => {
      if (notifiedReminderIds.has(task.actionId)) return;
      notifiedReminderIds.add(task.actionId);
      saveNotifiedReminderIds();
      showReminderPopup(plan, task);
    });
  }

  function isExecutedReminder(task) {
    return normalizeEnum(readField(task, "actionType", "action_type")) === "reminder"
      && normalizeStatus(readField(task, "status")) === "EXECUTED";
  }

  function showReminderPopup(plan, task) {
    const content = task.content || task.title || "你有一个提醒事项";
    reminderPopupContent.textContent = content;
    reminderPopupTime.textContent = `执行时间：${formatDateTime(plan.updatedAt || new Date().toISOString())}`;
    reminderPopup.classList.add("show");
    reminderPopup.setAttribute("aria-hidden", "false");
    clearTimeout(reminderPopupTimer);
    reminderPopupTimer = setTimeout(hideReminderPopup, 12000);
  }

  function hideReminderPopup() {
    reminderPopup.classList.remove("show");
    reminderPopup.setAttribute("aria-hidden", "true");
    clearTimeout(reminderPopupTimer);
  }

  function loadNotifiedReminderIds() {
    try {
      return new Set(JSON.parse(localStorage.getItem(REMINDER_NOTIFIED_KEY) || "[]"));
    } catch (err) {
      return new Set();
    }
  }

  function saveNotifiedReminderIds() {
    localStorage.setItem(REMINDER_NOTIFIED_KEY, JSON.stringify([...notifiedReminderIds].slice(-300)));
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, s => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[s]);
  }

  function formatConfidence(value) {
    if (typeof value !== "number") return "未知";
    return `${Math.round(value * 100)}%`;
  }

  function formatDateTime(value) {
    if (!value) return "";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return value;
    return date.toLocaleString("zh-CN", { hour12: false });
  }
</script>
</body>
</html>
